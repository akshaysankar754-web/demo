<div class="container-fluid">
  <div class="row gx-0">
    <div class="col-md-2">
      <app-sidebar></app-sidebar>
    </div>

    <div class="col-md-10 p-5 bg-light min-vh-100">
      <div class="page-panel p-4 shadow-sm rounded-4 bg-white">
        <h2 class="mb-4">Student Profile</h2>

        <form [formGroup]="profileForm" (ngSubmit)="submitForm()">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">College Name</label>
              <input type="text" class="form-control" formControlName="collegeName" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Department</label>
              <input type="text" class="form-control" formControlName="department" />
            </div>
            <div class="col-md-4">
              <label class="form-label">CGPA</label>
              <input type="number" step="0.01" class="form-control" formControlName="cgpa" />
            </div>
            <div class="col-md-4">
              <label class="form-label">Backlogs</label>
              <input type="number" class="form-control" formControlName="backlogs" />
            </div>
            <div class="col-md-4">
              <label class="form-label">Passing Year</label>
              <input type="number" class="form-control" formControlName="passingYear" />
            </div>
          </div>

          <div class="mt-4 d-flex gap-3 align-items-center">
            <button class="btn btn-primary px-5" type="submit">Save Profile</button>
            <span class="text-success" *ngIf="successMessage">{{ successMessage }}</span>
            <span class="text-danger" *ngIf="errorMessage">{{ errorMessage }}</span>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
