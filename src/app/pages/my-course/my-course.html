<div class="container-fluid mt-4">

    <div class="row">

        <!-- SIDEBAR -->

        <div class="col-md-2">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="mb-4">
                        Student Menu
                    </h3>

                    <div class="d-grid gap-3">

                        <a
                            routerLink="/my-course"
                            class="btn btn-primary">
                            My Course
                        </a>

                        <a
                            routerLink="/applications"
                            class="btn btn-outline-primary">
                            My Applications
                        </a>

                        <a
                            routerLink="/materials"
                            class="btn btn-outline-primary">
                            Study Materials
                        </a>

                        <a
                            routerLink="/feedback"
                            class="btn btn-outline-primary">
                            Feedback
                        </a>

                        <button
                            class="btn btn-danger"
                            (click)="logout()">
                            Logout
                        </button>

                    </div>

                </div>

            </div>

        </div>

        <!-- MAIN CONTENT -->

        <div class="col-md-10">

            <div class="card shadow mb-4">

                <div class="card-body">

                    <h1>
                        My Course
                    </h1>

                    <p>
                        Accepted internship details.
                    </p>

                </div>

            </div>

            <div *ngIf="courses.length === 0">

                <div class="alert alert-warning">

                    No accepted internship yet

                </div>

            </div>

            <div *ngIf="courses.length > 0" class="row">

                <div class="col-md-6 mb-4" *ngFor="let course of courses">

                    <div class="card shadow h-100">

                        <div class="card-body">

                            <h2>
                                {{ course.internshipTitle ?? course.title }}
                            </h2>

                            <hr>

                            <p>
                                <strong>Company:</strong>
                                {{ course.companyName }}
                            </p>

                            <p>
                                <strong>Description:</strong>
                                {{ course.description }}
                            </p>

                            <p>
                                <strong>Deadline:</strong>
                                {{ course.deadline | date }}
                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
