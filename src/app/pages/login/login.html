<div class="login-page container-fluid min-vh-100 d-flex align-items-center justify-content-center">

<div class="card shadow p-4 w-100 login-card">

<h2 class="text-center mb-4">
Login
</h2>

<form
[formGroup]="loginForm"
(ngSubmit)="submitForm()">

<div class="mb-3">

<input
type="email"
class="form-control"
placeholder="Email"
formControlName="email">

</div>


<div class="mb-3">

<input
type="password"
class="form-control"
placeholder="Password"
formControlName="password">

</div>


<button
class="btn btn-success w-100"
type="submit">

Login

</button>

</form>


<p class="text-danger text-center mt-3">

{{errorMessage}}

</p>


<p class="text-center mt-3">

Don't have account?

<a routerLink="/register">

Register

</a>

</p>

</div>

</div>
